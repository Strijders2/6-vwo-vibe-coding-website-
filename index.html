<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn Taken - Chat 1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Quicksand:wght@400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF6B9D;
            --secondary: #FEC84D;
            --accent: #4ECDC4;
            --purple: #9B59B6;
            --bg: #FFF8F0;
            --dark: #2C3E50;
            --light: #FFFFFF;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--bg);
            color: var(--dark);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            margin-bottom: 40px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--purple) 100%);
            border-radius: 20px;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            color: var(--light);
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .card {
            background: var(--light);
            border: 4px solid var(--dark);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 8px 8px 0 var(--dark);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .calendar-day-header {
            text-align: center;
            font-weight: 700;
            padding: 10px;
            background: var(--dark);
            color: var(--light);
            border-radius: 8px;
        }

        .calendar-day {
            min-height: 80px;
            padding: 8px;
            background: var(--light);
            border: 3px solid var(--dark);
            border-radius: 10px;
            cursor: pointer;
        }

        .calendar-day:hover {
            transform: translateY(-3px);
        }

        .calendar-day.today {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
        }

        .calendar-day.has-tasks {
            background: #e8f5e9;
        }

        .day-number {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .task-count-badge {
            background: var(--primary);
            color: var(--light);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .date-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .date-selector input {
            padding: 12px 20px;
            border: 3px solid var(--dark);
            border-radius: 10px;
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            flex: 1;
        }

        .btn {
            padding: 12px 30px;
            background: var(--accent);
            border: 3px solid var(--dark);
            border-radius: 10px;
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 4px 4px 0 var(--dark);
        }

        .btn-primary {
            background: var(--primary);
            color: var(--light);
        }

        .task-input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .task-input {
            flex: 1;
            padding: 15px 20px;
            border: 3px solid var(--dark);
            border-radius: 10px;
            font-family: 'Quicksand', sans-serif;
            font-size: 1rem;
            font-weight: 600;
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            margin-bottom: 12px;
            background: #f8f9fa;
            border: 3px solid var(--dark);
            border-radius: 12px;
        }

        .task-item.completed {
            opacity: 0.6;
            text-decoration: line-through;
        }

        .task-checkbox {
            width: 30px;
            height: 30px;
            cursor: pointer;
        }

        .task-text {
            flex: 1;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .task-delete {
            padding: 8px 15px;
            background: var(--primary);
            color: var(--light);
            border: 2px solid var(--dark);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
        }

        .version-tag {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 700;
            border: 3px solid var(--dark);
            box-shadow: 4px 4px 0 var(--dark);
        }
    </style>
</head>
<body>
    <div class="version-tag">Chat 1 - Basis</div>

    <div class="container">
        <header>
            <h1>📋 Mijn Takenlijst</h1>
            <p style="color: white; margin-top: 10px;">Plan je taken per dag</p>
        </header>

        <div class="card">
            <h2 style="margin-bottom: 20px; color: var(--primary);">Maand Overzicht</h2>
            <div class="calendar-grid">
                <div class="calendar-day-header">Ma</div>
                <div class="calendar-day-header">Di</div>
                <div class="calendar-day-header">Wo</div>
                <div class="calendar-day-header">Do</div>
                <div class="calendar-day-header">Vr</div>
                <div class="calendar-day-header">Za</div>
                <div class="calendar-day-header">Zo</div>
                <div id="calendarDays"></div>
            </div>
        </div>

        <div class="card">
            <div class="date-selector">
                <input type="date" id="taskDate" />
                <button class="btn" onclick="goToToday()">Vandaag</button>
            </div>

            <div class="task-input-group">
                <input type="text" id="taskInput" class="task-input" placeholder="Nieuwe taak toevoegen..." />
                <button class="btn btn-primary" onclick="addTask()">Toevoegen</button>
            </div>

            <h2 style="margin-bottom: 20px; color: var(--primary);">
                Taken voor <span id="selectedDate"></span>
            </h2>
            
            <ul id="taskList" class="task-list"></ul>
        </div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('tasks_chat1')) || {};
        let currentDate = new Date().toISOString().split('T')[0];
        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();

        function initializeDate() {
            document.getElementById('taskDate').value = currentDate;
            updateSelectedDate();
            renderCalendar();
            loadTasks();
        }

        function updateSelectedDate() {
            const dateInput = document.getElementById('taskDate');
            currentDate = dateInput.value;
            const date = new Date(currentDate + 'T00:00:00');
            document.getElementById('selectedDate').textContent = date.toLocaleDateString('nl-NL', { 
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
            });
            loadTasks();
        }

        function goToToday() {
            currentDate = new Date().toISOString().split('T')[0];
            document.getElementById('taskDate').value = currentDate;
            updateSelectedDate();
        }

        function renderCalendar() {
            const firstDay = new Date(currentYear, currentMonth, 1);
            const lastDay = new Date(currentYear, currentMonth + 1, 0);
            const firstDayOfWeek = (firstDay.getDay() + 6) % 7;
            const lastDate = lastDay.getDate();

            const calendarDays = document.getElementById('calendarDays');
            calendarDays.innerHTML = '';

            const today = new Date().toISOString().split('T')[0];

            for (let i = 0; i < firstDayOfWeek; i++) {
                calendarDays.appendChild(document.createElement('div'));
            }

            for (let day = 1; day <= lastDate; day++) {
                const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayTasks = tasks[dateStr] || [];
                
                const dayEl = document.createElement('div');
                dayEl.className = 'calendar-day';
                
                if (dateStr === today) dayEl.classList.add('today');
                if (dayTasks.length > 0) dayEl.classList.add('has-tasks');
                
                dayEl.innerHTML = `
                    <div class="day-number">${day}</div>
                    ${dayTasks.length > 0 ? `<span class="task-count-badge">${dayTasks.length}</span>` : ''}
                `;
                
                dayEl.onclick = () => {
                    currentDate = dateStr;
                    document.getElementById('taskDate').value = dateStr;
                    updateSelectedDate();
                };
                
                calendarDays.appendChild(dayEl);
            }
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            const taskText = input.value.trim();
            
            if (taskText === '') return;

            if (!tasks[currentDate]) {
                tasks[currentDate] = [];
            }

            tasks[currentDate].push({
                id: Date.now(),
                text: taskText,
                completed: false
            });

            saveTasks();
            loadTasks();
            renderCalendar();
            input.value = '';
        }

        function toggleTask(id) {
            if (tasks[currentDate]) {
                const task = tasks[currentDate].find(t => t.id === id);
                if (task) {
                    task.completed = !task.completed;
                    saveTasks();
                    loadTasks();
                }
            }
        }

        function deleteTask(id) {
            if (tasks[currentDate]) {
                tasks[currentDate] = tasks[currentDate].filter(t => t.id !== id);
                saveTasks();
                loadTasks();
                renderCalendar();
            }
        }

        function loadTasks() {
            const taskList = document.getElementById('taskList');
            taskList.innerHTML = '';

            const dayTasks = tasks[currentDate] || [];

            if (dayTasks.length === 0) {
                taskList.innerHTML = '<p style="text-align: center; color: #999; padding: 20px;">Geen taken voor deze dag.</p>';
                return;
            }

            dayTasks.forEach(task => {
                const li = document.createElement('li');
                li.className = 'task-item' + (task.completed ? ' completed' : '');
                li.innerHTML = `
                    <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''} 
                           onchange="toggleTask(${task.id})">
                    <span class="task-text">${task.text}</span>
                    <button class="task-delete" onclick="deleteTask(${task.id})">🗑️</button>
                `;
                taskList.appendChild(li);
            });
        }

        function saveTasks() {
            localStorage.setItem('tasks_chat1', JSON.stringify(tasks));
        }

        document.getElementById('taskDate').addEventListener('change', updateSelectedDate);
        document.getElementById('taskInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addTask();
        });

        initializeDate();
    </script>
</body>
</html>
